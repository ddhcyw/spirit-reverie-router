<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進入酩境中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #D4AF37; /* 質感金色 */
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p style="letter-spacing: 2px; font-size: 14px; color: #aaa;">正在通往專屬酩境...</p>
    </div>

    <script>
        // === 4個Tally問卷網址 ===
        const TALLY_URLS = {
            base: "https://tally.so/r/D4aMDl",
            b1: "https://tally.so/r/XxQX0d",
            b2: "https://tally.so/r/9q4VrQ",
            b3: "https://tally.so/r/lbzQpV"
        };

        // 對照 E7：如果URL沒帶明確的source（例如從物理場地QR掃進來的source=venue_xxx），
        // 用這裡的偵測結果當預設值，判斷是FB/IG in-app browser還是一般相機掃碼
        function detectSocialSource() {
            const ua = navigator.userAgent || '';
            const ref = document.referrer || '';

            if (ua.includes('Line')) return 'line_share';
            if (ref.includes('facebook.com') || ua.includes('FBAN') || ua.includes('FBAV')) {
                return 'image_qr_fb';
            }
            if (ua.includes('Instagram')) return 'image_qr_ig';
            return null; // 沒有明顯特徵，交給後面的預設值('direct'或既有source參數)處理
        }

        async function initLIFF() {
            try {
                // 填入在LINE Login Channel拿到的LIFF ID
                await liff.init({ liffId: "2010362948-r5hoV8Sy" });

                // 確保使用者登入
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 獲取LINE Profile
                const profile = await liff.getProfile();
                const uid = profile.userId;
                const displayName = profile.displayName;

                // 解析網址帶入的展場追蹤參數 (QR Code帶入)
                const urlParams = new URLSearchParams(window.location.search);
                const venue = urlParams.get('venue') || 'none';
                const zone = urlParams.get('zone') || 'none';
                const campaign = urlParams.get('campaign') || 'none';

                // 【新增】接收分享機制帶來的參數（E5/E6/E7）
                // ref：分享者的UID後6碼，用來記錄「這位新用戶是誰邀請來的」
                const referrerRef = urlParams.get('ref') || 'none';
                // source：如果分享圖片/連結那邊已經判斷出來源（image_qr_fb等），直接沿用；
                // 沒有的話，這裡自己偵測一次；再沒有，才落回原本QR Code系統帶的source或direct
                const explicitSource = urlParams.get('source');
                const detectedSource = detectSocialSource();
                const source = explicitSource || detectedSource || urlParams.get('source') || 'direct';

                let targetTallyUrl = TALLY_URLS.base; // 預設走原始版

                const MAKE_CHECK_URL = "https://hook.eu1.make.com/41ma4yejbpaw60hyahporgyl0ufa3uxr";

                try {
                    const response = await fetch(`${MAKE_CHECK_URL}?uid=${uid}`);
                    const data = await response.json();

                    if (data && data.surveyCount !== undefined) {
                        const surveyCount = data.surveyCount;

                        if (surveyCount === 0) targetTallyUrl = TALLY_URLS.b1;
                        else if (surveyCount === 1) targetTallyUrl = TALLY_URLS.b2;
                        else if (surveyCount >= 2) targetTallyUrl = TALLY_URLS.b3;
                    }
                } catch (err) {
                    console.error("查號台連線失敗，預設導向原始版測驗", err);
                }

                // 拼接Hidden Fields參數並跳轉至Tally
                // 【新增】referrerRef 需要在Tally後台也建立對應的隱藏欄位(referrer_ref)，
                // 之後Make.com建檔時寫入 Customer Profile 的 referrer_uid 欄位（做完整匹配比對）
                const finalRedirectUrl = `${targetTallyUrl}?uid=${encodeURIComponent(uid)}&displayName=${encodeURIComponent(displayName)}&source=${encodeURIComponent(source)}&venue=${encodeURIComponent(venue)}&zone=${encodeURIComponent(zone)}&campaign=${encodeURIComponent(campaign)}&referrerRef=${encodeURIComponent(referrerRef)}`;

                window.location.href = finalRedirectUrl;

            } catch (error) {
                console.error("LIFF 初始化失敗", error);
                document.body.innerHTML = "<p style='text-align:center; padding-top:50px;'>系統初始化失敗，請重新掃描QR Code</p>";
            }
        }

        window.onload = initLIFF;
    </script>
</body>
</html>
