<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進入酩境中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #D4AF37; /* 質感金色 */
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p style="letter-spacing: 2px; font-size: 14px; color: #aaa;">正在通往專屬酩境...</p>
    </div>

    <script>
        // === 4個Tally問卷網址 ===
        const TALLY_URLS = {
            base: "https://tally.so/r/D4aMDl",
            b1: "https://tally.so/r/XxQX0d",
            b2: "https://tally.so/r/9q4VrQ",
            b3: "https://tally.so/r/lbzQpV"
        };

        // === Airtable設定 (確保欄位名稱完全一致) ===
        const AIRTABLE_BASE_ID = "2HqdRQ77qWFeak";
        const AIRTABLE_TABLE_NAME = "Customer Profile"; 
        const AIRTABLE_API_KEY = "pat9ZvKeOQRa6krx9.8da8a9b6ad6c43cbeeeaade1c2dd326836a5c078265298c2eb4c7e423d93b24c"; 

        async function initLIFF() {
            try {
                // 填入在LINE Login Channel拿到的LIFF ID
                await liff.init({ liffId: "2010362948-r5hoV8Sy" });

                // 確保使用者登入
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 獲取LINE Profile
                const profile = await liff.getProfile();
                const uid = profile.userId;

                // 解析網址帶入的展場追蹤參數 (QR Code帶入)
                const urlParams = new URLSearchParams(window.location.search);
                const source = urlParams.get('source') || 'direct';
                const venue = urlParams.get('venue') || 'none';
                const zone = urlParams.get('zone') || 'none';
                const campaign = urlParams.get('campaign') || 'none';

                let targetTallyUrl = TALLY_URLS.base; // 預設走原始版
                
                // 向Airtable查詢填答歷史紀錄
                try {
                    const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}?filterByFormula=%7Bline_uid%7D%3D%27${uid}%27`, {
                        headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` }
                    });
                    const data = await response.json();
                    
                    if (data.records && data.records.length > 0) {
                        const surveyCount = data.records[0].fields.total_surveys || 0;
                        
                        // 根據填答次數（total_surveys）執行分流路由
                        if (surveyCount === 1) targetTallyUrl = TALLY_URLS.b1;
                        else if (surveyCount === 2) targetTallyUrl = TALLY_URLS.b2;
                        else if (surveyCount >= 3) targetTallyUrl = TALLY_URLS.b3;
                    }
                } catch (err) {
                    console.error("Airtable 查詢失敗，預設導向原始版測驗", err);
                }

                // 拼接Hidden Fields參數並跳轉至Tally
                const finalRedirectUrl = `${targetTallyUrl}?uid=${encodeURIComponent(uid)}&source=${encodeURIComponent(source)}&venue=${encodeURIComponent(venue)}&zone=${encodeURIComponent(zone)}&campaign=${encodeURIComponent(campaign)}`;

                window.location.href = finalRedirectUrl;

            } catch (error) {
                console.error("LIFF 初始化失敗", error);
                document.body.innerHTML = "<p style='text-align:center; padding-top:50px;'>系統初始化失敗，請重新掃描QR Code</p>";
            }
        }

        window.onload = initLIFF;
    </script>
</body>
</html>
